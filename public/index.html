<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Масло по VIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #f3f4f6;
      --surface:      #ffffff;
      --surface2:     #f0f0ee;
      --border:       #e2e0dc;
      --border2:      #cecbc5;
      --accent:       #111111;
      --accent-hover: #333333;
      --text:         #111111;
      --muted:        #6b7280;
      --soft:         #9ca3af;
      --green:        #16a34a;
      --blue:         #2563eb;
      --radius:       10px;
      --shadow:       0 4px 16px rgba(0,0,0,0.06);
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .brand { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }

    .session-badge {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 11px;
      font-size: 13px; font-weight: 600; color: var(--muted); white-space: nowrap;
    }

    .session-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .header-gap  { flex: 1; }

    /* ── INPUT BAR ── */
    .input-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }

    .vin-group {
      display: flex; align-items: stretch;
      border: 1px solid var(--border2); border-radius: var(--radius);
      overflow: hidden; background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
    }

    .vin-group:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    }

    #vinInput {
      border: none; outline: none; background: transparent;
      color: var(--text); font-family: 'Inter', monospace;
      font-size: 14px; font-weight: 600; letter-spacing: 1.5px;
      padding: 9px 14px; width: 210px; text-transform: uppercase;
    }

    #vinInput::placeholder { font-weight: 400; letter-spacing: 0; color: var(--soft); text-transform: none; }

    .vin-divider { width: 1px; background: var(--border); margin: 5px 0; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      border: none; border-radius: var(--radius);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      padding: 9px 16px; cursor: pointer;
      transition: opacity .15s, background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }

    .btn-ok { background: var(--accent); color: #fff; border-radius: 0; padding: 0 16px; }
    .btn-ok:hover { background: var(--accent-hover); }

    .btn-outline { background: var(--surface); border: 1px solid var(--border2); color: var(--muted); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: #f5f5f5; }
    .btn-outline.active { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: .45; pointer-events: none; }

    .bar-sep { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; }

    #fileInput { display: none; }

    .filename-pill {
      font-size: 12px; color: var(--soft);
      max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── VIN ROW ── */
    .vin-row { padding: 10px 24px 0; display: none; }

    .vin-row-inner {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 18px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--shadow-sm);
    }

    .vin-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--soft); }
    .vin-val { font-size: 17px; font-weight: 700; letter-spacing: 2.5px; color: var(--text); }

    /* ── MAIN GRID ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px 24px 0;
    }

    /* ── РЕКОМЕНДАЦИИ — полная ширина под гридом ── */
    .rec-section {
      padding: 16px 24px 28px;
      display: none;
    }

    .rec-section.visible { display: block; }

    .rec-hd {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }

    .rec-hd-ico { font-size: 15px; }

    .rec-hd-ttl { font-size: 13px; font-weight: 600; color: var(--text); }

    .rec-hd-sub { font-size: 12px; color: var(--soft); margin-left: 4px; }

    .rec-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    /* ── ЛОГОТИП БРЕНДА ── */
    .oil-card-logo {
      height: 22px;
      width: auto;
      max-width: 80px;
      object-fit: contain;
      object-position: left center;
      opacity: 0.85;
      display: block;
      flex-shrink: 0;
    }
    .oil-card-logo.hidden { display: none; }

    /* ── КАРТОЧКА МАСЛА ── */
    .oil-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .oil-card-top {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .oil-card-top-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .oil-card-top-logo {
      display: flex;
      align-items: center;
      min-height: 22px;
    }

    .oil-card-brand {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 3px;
    }

    .oil-card-article {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      font-family: 'Inter', monospace;
      letter-spacing: 0.3px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 4px;
      padding: 1px 4px;
      margin: -1px -4px;
      transition: background .15s, color .15s;
    }

    .oil-card-article:hover {
      background: #f0f0ee;
      color: var(--blue);
    }

    .oil-card-article:active {
      background: #e0eeff;
    }

    .oil-card-article .copy-ico {
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
    }

    .oil-card-article:hover .copy-ico { opacity: 1; }

    .oil-card-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .oil-card-price span {
      font-size: 12px;
      font-weight: 400;
      color: var(--soft);
    }

    .oil-card-body { padding: 12px 16px; flex: 1; }

    .oil-card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .oil-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 8px;
    }

    .meta-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
    }

    .meta-chip.visc {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
      font-weight: 600;
    }

    .oil-card-footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stock-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
    }

    .stock-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }

    .stock-dot.ok  { background: var(--green); }
    .stock-dot.low { background: #f59e0b; }

    .stock-count { color: var(--muted); }

    .vol-chip {
      font-size: 12px;
      font-weight: 600;
      color: var(--soft);
    }

    /* ── SHARED CARD STYLES ── */
    .card {
      background: var(--surface); border-radius: 14px;
      box-shadow: var(--shadow); overflow: hidden;
    }

    .card-hd {
      padding: 13px 18px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }

    .card-ico { font-size: 15px; line-height: 1; }
    .card-ttl { font-size: 13px; font-weight: 600; }
    .card-bd  { padding: 18px; }

    /* ── CAR ── */
    .car-name { font-size: 20px; font-weight: 700; margin-bottom: 14px; }

    .car-field {
      display: flex; align-items: baseline; gap: 8px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }

    .car-field:last-child { border-bottom: none; }
    .cf-key { font-size: 13px; font-weight: 600; min-width: 88px; flex-shrink: 0; }
    .cf-val { font-size: 13px; color: var(--muted); }

    /* ── OIL ── */
    .oil-title    { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .oil-volume   { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .oil-volume strong { color: var(--text); }

    .oil-section-lbl {
      font-size: 11px; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: var(--soft); margin: 12px 0 7px;
    }

    .oil-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; margin-bottom: 6px;
    }

    .oil-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
    .oil-row:last-child { margin-bottom: 0; }

    .oil-key {
      font-size: 12px; font-weight: 600; color: var(--muted);
      min-width: 66px; flex-shrink: 0; padding-top: 2px;
    }

    .badges { display: flex; flex-wrap: wrap; gap: 4px; }

    .badge {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 4px; padding: 2px 8px;
      font-size: 12px; font-weight: 500; color: var(--text);
    }

    .source-row {
      display: flex; justify-content: flex-end;
      margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--border);
    }

    .source-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--soft); text-decoration: none;
      transition: color .15s;
    }

    .source-link:hover { color: var(--accent); text-decoration: underline; }

    /* ── EMPTY / LOADING ── */
    .empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 180px; gap: 8px; color: var(--soft);
    }

    .empty-ico { font-size: 32px; opacity: .35; }
    .empty-txt { font-size: 13px; }

    .loading-row {
      display: flex; align-items: center; gap: 10px;
      justify-content: center; min-height: 180px;
      color: var(--muted); font-size: 13px;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1917; color: #fff;
      font-size: 13px; font-weight: 500;
      padding: 10px 20px; border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 999; opacity: 0;
      transition: transform .25s ease, opacity .25s ease;
      white-space: nowrap; pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .rec-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 680px) {
      header, .input-bar { padding-left: 14px; padding-right: 14px; }
      .vin-row { padding: 10px 14px 0; }
      .main { grid-template-columns: 1fr; padding: 12px 14px 0; }
      .rec-section { padding: 12px 14px 20px; }
      .rec-grid { grid-template-columns: 1fr; }
      #vinInput { width: 150px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">VINOIL</div>
    <div class="session-badge">
      <div class="session-dot"></div>
      <span id="sessionLabel">…</span>
    </div>
    <div class="header-gap"></div>
  </header>

  <div class="input-bar">
    <div class="vin-group">
      <input id="vinInput" type="text" maxlength="17"
        placeholder="Введите VIN"
        autocomplete="off" autocorrect="off" spellcheck="false" />
      <div class="vin-divider"></div>
      <button class="btn btn-ok" id="btnOk">ОК</button>
    </div>

    <div class="bar-sep"></div>

    <label class="btn btn-outline" for="fileInput" id="lblFile">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Загрузить
    </label>
    <input type="file" id="fileInput" accept="image/*" />
    <span class="filename-pill" id="fileName"></span>

    <button class="btn btn-outline" id="btnSend">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      Отправить
    </button>
  </div>

  <div class="vin-row" id="vinRow">
    <div class="vin-row-inner">
      <span class="vin-lbl">VIN</span>
      <span class="vin-val" id="vinDisplay"></span>
    </div>
  </div>

  <!-- Основной грид: авто + масло -->
  <div class="main">
    <div class="card">
      <div class="card-hd">
        <span class="card-ico">🚗</span>
        <span class="card-ttl">Автомобиль</span>
      </div>
      <div class="card-bd" id="carInfo">
        <div class="empty">
          <div class="empty-ico">🔍</div>
          <div class="empty-txt">Введите VIN для поиска</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <span class="card-ico">🛢️</span>
        <span class="card-ttl">Масло и жидкости</span>
      </div>
      <div class="card-bd" id="liquids">
        <div class="empty">
          <div class="empty-ico">⚙️</div>
          <div class="empty-txt">Данные появятся после поиска</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Рекомендации из каталога — на всю ширину -->
  <div class="rec-section" id="recSection">
    <div class="rec-hd">
      <span class="rec-hd-ico">🏷️</span>
      <span class="rec-hd-ttl">В наличии на складе</span>
      <span class="rec-hd-sub" id="recSub"></span>
    </div>
    <div class="rec-grid" id="recGrid"></div>
  </div>

  <div id="history" style="display:none"></div>
  <div class="toast" id="toast"></div>

  <script>
    // ── STATE ─────────────────────────────────────────────────
    let currentVin  = null;
    let sessionId   = null;
    let loading     = false;

    // ── ELEMENTS ──────────────────────────────────────────────
    const vinInput   = document.getElementById('vinInput');
    const btnOk      = document.getElementById('btnOk');
    const btnSend    = document.getElementById('btnSend');
    const fileInput  = document.getElementById('fileInput');
    const fileName   = document.getElementById('fileName');
    const vinRow     = document.getElementById('vinRow');
    const vinDisplay = document.getElementById('vinDisplay');
    const carInfo    = document.getElementById('carInfo');
    const liquids    = document.getElementById('liquids');
    const recSection = document.getElementById('recSection');
    const recGrid    = document.getElementById('recGrid');
    const recSub     = document.getElementById('recSub');

    // ── INIT ──────────────────────────────────────────────────
    async function init() {
      const path = location.pathname.slice(1);
      if (!path) {
        const res  = await fetch('/new-session');
        const data = await res.json();
        window.location.href = '/' + data.session_id;
        return;
      }
      sessionId = path;
      document.getElementById('sessionLabel').textContent = 'Session: ' + sessionId;
    }

    init();

    // ── EVENTS ────────────────────────────────────────────────
    vinInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendManual(); });
    btnOk.addEventListener('click', sendManual);
    btnSend.addEventListener('click', () => { if (fileInput.files[0]) upload(); else sendManual(); });

    fileInput.addEventListener('change', () => {
      const f = fileInput.files[0];
      fileName.textContent = f ? f.name : '';
      document.getElementById('lblFile').classList.toggle('active', !!f);
    });

    // ── РУЧНОЙ VIN ────────────────────────────────────────────
    async function sendManual() {
      const vin = vinInput.value.trim();
      if (!vin) { vinInput.focus(); return; }
      try {
        await fetch('/manual/' + sessionId, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ vin })
        });
      } catch (e) { console.error('manual error', e); }
    }

    // ── ЗАГРУЗКА ФОТО ─────────────────────────────────────────
    async function upload() {
      const file = fileInput.files[0];
      if (!file) return;

      // Сбрасываем файл сразу — чтобы повторная загрузка всегда работала
      fileInput.value = '';
      fileName.textContent = '';
      document.getElementById('lblFile').classList.remove('active');

      loading = true;
      setLoading(carInfo, 'Распознаём VIN… (попытка 1/3)');
      setLoading(liquids, 'Распознаём VIN…');
      hideRec();
      btnSend.disabled = true;

      const fd = new FormData();
      fd.append('image', file);

      try {
        const res  = await fetch('/upload/' + sessionId, { method: 'POST', body: fd });
        const data = await res.json();

        if (!data.vin) {
          // Сервер уже сделал 3 попытки — всё равно не нашёл
          loading = false; // сбрасываем — следующая загрузка должна работать
          setError(carInfo, 'VIN не найден на фото');
          setError(liquids, 'Попробуйте сделать фото чётче или ввести вручную');
          showToast('VIN не удалось распознать после 3 попыток');
        }
        // Если VIN найден — polling подхватит и загрузит данные
      } catch (e) {
        loading = false;
        setError(carInfo, 'Ошибка отправки');
        setError(liquids, 'Ошибка отправки');
        showToast('Ошибка соединения с сервером');
      } finally {
        btnSend.disabled = false;
      }
    }

    // ── POLLING ───────────────────────────────────────────────
    async function poll() {
      if (!sessionId) return;
      try {
        const res  = await fetch('/data/' + sessionId);
        if (!res.ok) return;
        const data = await res.json();

        if (!loading) {
          const vin = data.vin || null;
          vinRow.style.display = vin ? 'block' : 'none';
          if (vin) vinDisplay.textContent = vin.toUpperCase();

          if (vin && vin !== currentVin) {
            currentVin = vin;
            vinInput.value = vin.toUpperCase();
            vinRow.style.display = 'block';
            vinDisplay.textContent = vin.toUpperCase();
            hideRec();
            loadCarInfo(vin);
            loadLiquids(vin);
          }
        }
      } catch (e) { console.error('poll error', e); }
    }

    setInterval(poll, 3000);

    // ── CAR INFO ──────────────────────────────────────────────
    async function loadCarInfo(vin) {
      setLoading(carInfo);
      try {
        const res  = await fetch('/car-info/' + vin);
        const data = await res.json();
        if (res.status === 404 || data.error === 'not_found') {
          setError(carInfo, 'Автомобиль не найден в базе');
          return;
        }
        renderCar(data);
      } catch (e) {
        setError(carInfo, 'Нет данных об автомобиле');
      }
    }

    function renderCar(d) {
      const name = [d.brand, d.model].filter(Boolean).join(' ');
      const fields = [
        { k: 'Год',       v: d.year },
        { k: 'Двигатель', v: d.engine ? d.engine.code + ' (' + d.engine.volume + 'л)' : null },
        { k: 'Тип',       v: d.engine?.type },
        { k: 'Мощность',  v: d.power_hp ? d.power_hp + ' л.с' : null },
        { k: 'КПП',       v: d.transmission },
        { k: 'Привод',    v: d.drive },
      ].filter(f => f.v);

      carInfo.innerHTML =
        (name ? '<div class="car-name">' + name + '</div>' : '') +
        '<div>' +
          fields.map(f =>
            '<div class="car-field"><span class="cf-key">' + f.k + ':</span><span class="cf-val">' + f.v + '</span></div>'
          ).join('') +
          (!fields.length && !name ? '<p style="color:var(--soft);font-size:13px">Нет данных</p>' : '') +
        '</div>';
    }

    // ── OIL ───────────────────────────────────────────────────
    async function loadLiquids(vin) {
      const localVin = vin;
      setLoading(liquids);

      try {
        const res  = await fetch('/oil/' + vin);
        const data = await res.json();

        if (localVin !== currentVin) return;

        if (data.source === 'car_not_found') {
          setError(liquids, 'Нет данных — возможно это не легковой автомобиль');
          return;
        }

        const oil       = data.oil;
        const sourceUrl = data?.url || null;
        const recs      = data.recommendations || [];

        if (!oil) {
          liquids.innerHTML = emptyHtml('🛢️', 'Нет данных по маслу');
          renderRec(recs);
          return;
        }

        const volume = oil.volume;
        const best   = oil.oil?.best        || [];
        const alt    = oil.oil?.alternative || [];

        function renderItems(arr) {
          if (!arr.length) return '<p style="color:var(--soft);font-size:13px">—</p>';
          return arr.map(item => {
            const specs     = item.specs     || [];
            const viscosity = item.viscosity || [];
            return '<div class="oil-item">' +
              (specs.length
                ? '<div class="oil-row"><span class="oil-key">Допуски:</span><div class="badges">' +
                  specs.map(s => '<span class="badge">' + s + '</span>').join('') +
                  '</div></div>' : '') +
              (viscosity.length
                ? '<div class="oil-row"><span class="oil-key">Вязкость:</span><div class="badges">' +
                  viscosity.map(v => '<span class="badge">' + v + '</span>').join('') +
                  '</div></div>' : '') +
              '</div>';
          }).join('');
        }

        liquids.innerHTML =
          '<div class="oil-title">Масло двигателя</div>' +
          (volume ? '<div class="oil-volume">Объём: <strong>' + volume + ' л</strong></div>' : '') +
          '<div class="oil-section-lbl">Лучший выбор</div>' +
          renderItems(best) +
          '<div class="oil-section-lbl">Альтернатива</div>' +
          renderItems(alt) +
          (sourceUrl
            ? '<div class="source-row"><a href="' + sourceUrl + '" target="_blank" rel="noopener noreferrer" class="source-link">' +
              '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>' +
              '<polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
              'источник</a></div>' : '');

        // Рекомендации из склада
        renderRec(recs);

      } catch (e) {
        if (localVin !== currentVin) return;
        setError(liquids, 'Ошибка загрузки');
      }
    }

    // ── РЕКОМЕНДАЦИИ ──────────────────────────────────────────
    function renderRec(recs) {
      if (!recs || !recs.length) { hideRec(); return; }

      recSub.textContent = recs.length + ' позиц' + (recs.length === 1 ? 'ия' : 'ии') + ' подобрано';
      recGrid.innerHTML  = recs.map(renderRecCard).join('');
      recSection.classList.add('visible');
    }

    function hideRec() {
      recSection.classList.remove('visible');
      recGrid.innerHTML = '';
    }

    function renderRecCard(r) {
      const stockOk  = r.stock >= 3;
      const stockTxt = r.stock + ' шт.';
      const allSpecs = [
        ...(r.specs?.api   || []),
        ...(r.specs?.acea  || []),
        ...(r.specs?.ilsac || []),
      ].slice(0, 4);

      const logoSrc  = brandLogo(r.brand);
      // onerror: прячем img чтобы не было мерцания при отсутствующем файле
      const logoHtml = logoSrc
        ? '<img class="oil-card-logo" src="' + logoSrc + '" alt="' + esc(r.brand) + '" onerror="this.classList.add(\'hidden\')">'
        : '';

      return '<div class="oil-card">' +

        // Шапка: ряд 1 — [бренд+артикул] | [цена]
        '<div class="oil-card-top">' +
          '<div class="oil-card-top-main">' +
            '<div>' +
              '<div class="oil-card-brand">' + esc(r.brand) + '</div>' +
              '<div class="oil-card-article" onclick="copyArticle(this, \'' + esc(r.article) + '\')">' +
                esc(r.article) +
                '<svg class="copy-ico" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
              '</div>' +
            '</div>' +
            '<div class="oil-card-price">' + formatPrice(r.price) + ' <span>₽</span></div>' +
          '</div>' +
          // Ряд 2 — логотип бренда (отдельно, не мешает цене)
          '<div class="oil-card-top-logo">' + logoHtml + '</div>' +
        '</div>' +

        // Тело: описание + чипы
        '<div class="oil-card-body">' +
          (r.description
            ? '<div class="oil-card-desc">' + esc(r.description) + '</div>'
            : '') +
          '<div class="oil-card-meta">' +
            (r.viscosity
              ? '<span class="meta-chip visc">' + esc(r.viscosity) + '</span>'
              : '') +
            (r.volume
              ? '<span class="meta-chip">' + r.volume + ' л</span>'
              : '') +
            allSpecs.map(s => '<span class="meta-chip">' + esc(s) + '</span>').join('') +
          '</div>' +
        '</div>' +

        // Футер: остаток + тип масла
        '<div class="oil-card-footer">' +
          '<div class="stock-badge">' +
            '<div class="stock-dot ' + (stockOk ? 'ok' : 'low') + '"></div>' +
            '<span class="stock-count">' + stockTxt + '</span>' +
          '</div>' +
          '<span class="vol-chip">' + esc(r.oil_type || '') + '</span>' +
        '</div>' +

      '</div>';
    }

    function formatPrice(p) {
      return Number(p).toLocaleString('ru-RU');
    }

    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── HELPERS ───────────────────────────────────────────────
    function setLoading(el, msg) {
      el.innerHTML = '<div class="loading-row"><div class="spinner"></div>' + (msg || 'Загрузка…') + '</div>';
    }

    function setError(el, msg) {
      el.innerHTML = emptyHtml('⚠️', msg);
    }

    function emptyHtml(icon, msg) {
      return '<div class="empty"><div class="empty-ico">' + icon + '</div><div class="empty-txt">' + msg + '</div></div>';
    }

    // ── ЛОГОТИПЫ БРЕНДОВ ──────────────────────────────────────
    const BRAND_LOGOS = {
      'LIQUI MOLY':    'LIQUI MOLY',
      'CASTROL':       'castrol',
      'MOBIL':         'mobil',
      'SHELL':         'Shell',
      'ZIC':           'zic',
      'TOTACHI':       'totachi',
      'SINTEC':        'sintec',
      'LUKOIL':        'lukoil',
      'ROLF':          'rolf',
      'AREOL':         'areol',
      'MANNOL':        'mannol',
      'REPSOL':        'repsol',
      'BARDAHL':       'bardahl',
      'TAKAYAMA':      'takayma',
      'HYUNDAI XTEER': 'HYUNDAI XTEER',
      'TOYOTA':        'toyota',
      'LEXUS':         'lexus',
      'MOBIS':         'no',
      'NISSAN':        'nissan',
      'MITSUBISHI':    'mitsubishi',
      'VAG':           'Volkswagen',
      'GM':            'gm',
      'IDEMITSU':      'idemitsu',
      'REINWELL':      'reinwell',
      'PROFI-CAR':     'PROFI-CAR',
      'FURO':          'furo',
      'PEXOL':         'pexol',
      'COMMA':         'comma',
      'HI-GEAR':       'hi-gear',
      'LAVR':          'no',
      'ВМПАВТО':       'ВМПАВТО',
    };

    function brandLogo(brand) {
      const key  = (brand || '').toUpperCase();
      const file = BRAND_LOGOS[key] || BRAND_LOGOS[brand] || null;
      // Если бренд неизвестен или явно помечен как 'no' — не рендерим img
      if (!file || file === 'no') return null;
      return '/logo/' + file + '.webp';
    }

    // ── КОПИРОВАНИЕ АРТИКУЛА ──────────────────────────────────
    function copyArticle(el, article) {
      navigator.clipboard.writeText(article).then(() => {
        // Временно меняем цвет элемента на зелёный
        el.style.color = 'var(--green)';
        setTimeout(() => el.style.color = '', 1200);
        showToast('Скопировано: ' + article, 2000);
      }).catch(() => {
        // Fallback для старых браузеров
        const ta = document.createElement('textarea');
        ta.value = article;
        ta.style.position = 'fixed';
        ta.style.opacity  = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('Скопировано: ' + article, 2000);
      });
    }

    function showToast(msg, duration = 3500) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), duration);
    }
  </script>
</body>
</html>
