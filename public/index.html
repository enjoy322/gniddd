<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>Session: <span id="session"></span></h2>

<input id="vinInput" placeholder="Введи VIN">
<button onclick="sendManual()">OK</button>

<br><br>

<input type="file" id="fileInput" accept="image/*" capture="environment">
<button onclick="upload()">Загрузить фото</button>

<h2>VIN: <span id="vin">—</span></h2>

<div id="carInfo"></div>

<!-- история скрыта -->
<div id="history" style="display:none"></div>

<div id="liquids"></div>

<script>

let sessionId = null;
let loading = false;

init();

// 🆕 INIT
async function init() {
  const path = location.pathname.slice(1);

  if (!path) {
    const res = await fetch("/new-session");
    const data = await res.json();
    window.location.href = "/" + data.session_id;
    return;
  }

  sessionId = path;
  document.getElementById("session").innerText = sessionId;
}
async function sendManual() {
  const vin = document.getElementById("vinInput").value;

  if (!vin) return;

  try {
    const res = await fetch("/manual/" + sessionId, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ vin })
    });

    const data = await res.json();
    console.log("manual result:", data);

  } catch (e) {
    console.error(e);
  }
}
// 📤 ЗАГРУЗКА ФОТО
async function upload() {
  loading = true;
  document.getElementById("vin").innerText = "Обработка...";

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("выбери файл");
    loading = false;
    return;
  }

  const fd = new FormData();
  fd.append("image", file);

  try {
    await fetch("/upload/" + sessionId, {
      method: "POST",
      body: fd
    });
  } catch (e) {
    console.error(e);
  }

  loading = false;
}

// 🔁 POLL
async function poll() {
  if (!sessionId) return;

  try {
    const res = await fetch("/data/" + sessionId);
    if (!res.ok) return;

    const data = await res.json();

    if (!loading) {
      document.getElementById("vin").innerText = data.vin || "—";

      if (data.vin) {
        loadCarInfo(data.vin);
        loadLiquids(data.vin);
      }
    }

  } catch (e) {
    console.error(e);
  }
}

// 🚗 CAR INFO
async function loadCarInfo(vin) {
  try {
    const res = await fetch(`/car-info/${vin}`);
    const data = await res.json();

    document.getElementById("carInfo").innerHTML = `
      <h3>${data.brand} ${data.model} (${data.year})</h3>
      <p>Двигатель: ${data.engine.code} ${data.engine.volume}л</p>
      <p>Тип: ${data.engine.type}</p>
      <p>Мощность: ${data.power_hp} л.с</p>
      <p>КПП: ${data.transmission || "нет данных"}</p>
    `;
  } catch (e) {
    console.error("car info error", e);
  }
}

// 🛢 LIQUIDS
async function loadLiquids(vin) {
  try {
    const res = await fetch(`/oil/${vin}`);
    const data = await res.json();

    const oil = data.oil;

    if (!oil) {
      document.getElementById("liquids").innerHTML = "<p>Нет данных</p>";
      return;
    }

    const volume = oil.volume;

    const best = oil.oil?.best || [];
    const alt = oil.oil?.alternative || [];

    function renderList(arr) {
      return arr.map(item => `
        <div style="margin-bottom:10px;">
          <div>Допуски: ${item.specs.join(", ") || "—"}</div>
          <div>Вязкость: ${item.viscosity.join(", ") || "—"}</div>
        </div>
      `).join("");
    }

    document.getElementById("liquids").innerHTML = `
      <h3>Масло двигателя</h3>
      <p><b>Объем:</b> ${volume ? volume + " л" : "—"}</p>

      <h4>Лучший выбор</h4>
      ${renderList(best) || "<p>—</p>"}

      <h4>Альтернатива</h4>
      ${renderList(alt) || "<p>—</p>"}
    `;

  } catch (e) {
    console.error("oil error", e);
  }
}
// 🔁 старт polling
setInterval(poll, 2000);

</script>

</body>
</html>
