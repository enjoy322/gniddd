<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Масло по VIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #f3f4f6;
      --surface:      #ffffff;
      --surface2:     #f0f0ee;
      --border:       #e2e0dc;
      --border2:      #cecbc5;
      --accent:       #111111;
      --accent-hover: #333333;
      --text:         #111111;
      --muted:        #6b7280;
      --soft:         #9ca3af;
      --green:        #16a34a;
      --radius:       10px;
      --shadow:       0 4px 16px rgba(0,0,0,0.06);
      --shadow-sm:    0 1px 3px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── HEADER / TOOLBAR ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .brand {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      white-space: nowrap;
    }

    .session-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 11px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }

    .session-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .header-gap { flex: 1; }

    /* ── INPUT BAR ── */
    .input-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* VIN input + OK */
    .vin-group {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
    }

    .vin-group:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    }

    #vinInput {
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-family: 'Inter', monospace;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.5px;
      padding: 9px 14px;
      width: 210px;
      text-transform: uppercase;
    }

    #vinInput::placeholder {
      font-weight: 400;
      letter-spacing: 0;
      color: var(--soft);
      text-transform: none;
    }

    .vin-divider {
      width: 1px;
      background: var(--border);
      margin: 5px 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: none;
      border-radius: var(--radius);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 16px;
      cursor: pointer;
      transition: opacity .15s, background .15s, border-color .15s, color .15s;
      white-space: nowrap;
    }

    .btn-ok {
      background: var(--accent);
      color: #fff;
      border-radius: 0;
      padding: 0 16px;
    }

    .btn-ok:hover { background: var(--accent-hover); }

    .btn-outline {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--muted);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #f5f5f5;
    }

    .btn-outline.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn:disabled { opacity: .45; pointer-events: none; }

    .bar-sep {
      width: 1px;
      height: 26px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* File input hidden, triggered by label */
    #fileInput { display: none; }

    .filename-pill {
      font-size: 12px;
      color: var(--soft);
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── VIN DISPLAY ROW ── */
    .vin-row {
      padding: 10px 24px 0;
      display: none;
    }

    .vin-row-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-sm);
    }

    .vin-lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--soft);
    }

    .vin-val {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--text);
    }

    /* ── MAIN GRID ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px 24px 28px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-hd {
      padding: 13px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-ico { font-size: 15px; line-height: 1; }

    .card-ttl {
      font-size: 13px;
      font-weight: 600;
    }

    .card-bd { padding: 18px; }

    /* ── CAR ── */
    .car-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .car-field {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .car-field:last-child { border-bottom: none; }

    .cf-key {
      font-size: 13px;
      font-weight: 600;
      min-width: 88px;
      flex-shrink: 0;
    }

    .cf-val {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── OIL ── */
    .oil-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .oil-volume {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .oil-volume strong { color: var(--text); }

    .oil-section-lbl {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--soft);
      margin: 12px 0 7px;
    }

    .oil-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }

    .oil-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 5px;
    }

    .oil-row:last-child { margin-bottom: 0; }

    .oil-key {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      min-width: 66px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .badges { display: flex; flex-wrap: wrap; gap: 4px; }

    .badge {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .source-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .source-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--soft);
      text-decoration: none;
      transition: color .15s;
    }

    .source-link:hover { color: var(--accent); text-decoration: underline; }

    /* ── EMPTY / LOADING ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      gap: 8px;
      color: var(--soft);
    }

    .empty-ico { font-size: 30px; opacity: .35; }
    .empty-txt { font-size: 13px; }

    .loading-row {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      min-height: 180px;
      color: var(--muted);
      font-size: 13px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      header, .input-bar { padding-left: 14px; padding-right: 14px; }
      .vin-row { padding: 10px 14px 0; }
      .main { grid-template-columns: 1fr; padding: 12px 14px 20px; }
      #vinInput { width: 150px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="brand">VINOIL</div>
    <div class="session-badge">
      <div class="session-dot"></div>
      <span id="sessionLabel">…</span>
    </div>
    <div class="header-gap"></div>
  </header>

  <!-- INPUT BAR -->
  <div class="input-bar">

    <!-- VIN + OK -->
    <div class="vin-group">
      <input id="vinInput" type="text" maxlength="17"
        placeholder="Введите VIN"
        autocomplete="off" autocorrect="off" spellcheck="false" />
      <div class="vin-divider"></div>
      <button class="btn btn-ok" id="btnOk">ОК</button>
    </div>

    <div class="bar-sep"></div>

    <!-- Фото — без capture, iOS даёт выбор камера/галерея -->
    <label class="btn btn-outline" for="fileInput" id="lblFile">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Загрузить
    </label>
    <input type="file" id="fileInput" accept="image/*" />
    <span class="filename-pill" id="fileName"></span>

    <!-- Отправить -->
    <button class="btn btn-outline" id="btnSend">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      Отправить
    </button>

  </div>

  <!-- VIN display -->
  <div class="vin-row" id="vinRow">
    <div class="vin-row-inner">
      <span class="vin-lbl">VIN</span>
      <span class="vin-val" id="vinDisplay"></span>
    </div>
  </div>

  <!-- GRID -->
  <div class="main">
    <div class="card">
      <div class="card-hd">
        <span class="card-ico">🚗</span>
        <span class="card-ttl">Автомобиль</span>
      </div>
      <div class="card-bd" id="carInfo">
        <div class="empty">
          <div class="empty-ico">🔍</div>
          <div class="empty-txt">Введите VIN для поиска</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <span class="card-ico">🛢️</span>
        <span class="card-ttl">Масло и жидкости</span>
      </div>
      <div class="card-bd" id="liquids">
        <div class="empty">
          <div class="empty-ico">⚙️</div>
          <div class="empty-txt">Данные появятся после поиска</div>
        </div>
      </div>
    </div>
  </div>

  <div id="history" style="display:none"></div>

  <script>
    // ── STATE ─────────────────────────────────────────────────
    let currentVin = null;
    let sessionId  = null;
    let loading    = false;

    // ── ELEMENTS ──────────────────────────────────────────────
    const vinInput   = document.getElementById('vinInput');
    const btnOk      = document.getElementById('btnOk');
    const btnSend    = document.getElementById('btnSend');
    const fileInput  = document.getElementById('fileInput');
    const fileName   = document.getElementById('fileName');
    const vinRow     = document.getElementById('vinRow');
    const vinDisplay = document.getElementById('vinDisplay');
    const carInfo    = document.getElementById('carInfo');
    const liquids    = document.getElementById('liquids');

    // ── INIT — точная копия оригинала ─────────────────────────
    // Сессия живёт в URL: /XXXXXX
    // Если путь пустой — сервер генерирует сессию и редиректит
    async function init() {
      const path = location.pathname.slice(1);

      if (!path) {
        const res  = await fetch('/new-session');
        const data = await res.json();
        window.location.href = '/' + data.session_id;
        return;
      }

      sessionId = path;
      document.getElementById('sessionLabel').textContent = 'Session: ' + sessionId;
    }

    init();

    // ── ENTER → OK ────────────────────────────────────────────
    vinInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendManual();
    });
    btnOk.addEventListener('click', sendManual);

    // ── ОТПРАВИТЬ: если файл выбран — upload, иначе manual ────
    btnSend.addEventListener('click', () => {
      if (fileInput.files[0]) upload();
      else sendManual();
    });

    // ── ВЫБОР ФАЙЛА ───────────────────────────────────────────
    fileInput.addEventListener('change', () => {
      const f = fileInput.files[0];
      fileName.textContent = f ? f.name : '';
      if (f) document.getElementById('lblFile').classList.add('active');
      else   document.getElementById('lblFile').classList.remove('active');
    });

    // ── РУЧНОЙ VIN — POST /manual/:session ───────────────────
    async function sendManual() {
      const vin = vinInput.value.trim();
      if (!vin) { vinInput.focus(); return; }

      try {
        const res = await fetch('/manual/' + sessionId, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ vin })
        });
        const data = await res.json();
        console.log('manual result:', data);
        // Результат придёт через polling /data/:session
      } catch (e) {
        console.error('manual error', e);
      }
    }

    // ── ЗАГРУЗКА ФОТО — POST /upload/:session ─────────────────
    async function upload() {
      const file = fileInput.files[0];
      if (!file) { alert('Выберите файл'); return; }

      loading = true;
      setLoading(carInfo, 'Распознаём VIN…');
      setLoading(liquids, 'Распознаём VIN…');
      btnSend.disabled = true;

      const fd = new FormData();
      fd.append('image', file);

      try {
        await fetch('/upload/' + sessionId, { method: 'POST', body: fd });
        // Результат придёт через polling /data/:session
      } catch (e) {
        console.error('upload error', e);
        setError(carInfo, 'Ошибка загрузки');
        setError(liquids, 'Ошибка загрузки');
      } finally {
        loading = false;
        btnSend.disabled = false;
      }
    }

    // ── POLLING — GET /data/:session каждые 3 сек ─────────────
    async function poll() {
      if (!sessionId) return;

      try {
        const res = await fetch('/data/' + sessionId);
        if (!res.ok) return;

        const data = await res.json();

        if (!loading) {
          const vin = data.vin || null;

          // Показываем VIN
          vinRow.style.display = vin ? 'block' : 'none';
          if (vin) vinDisplay.textContent = vin.toUpperCase();
          document.getElementById('vinDisplay').textContent = (vin || '—').toUpperCase();

          // Если VIN изменился — грузим данные
          if (vin && vin !== currentVin) {
            currentVin = vin;
            vinInput.value = vin.toUpperCase();
            vinRow.style.display = 'block';
            vinDisplay.textContent = vin.toUpperCase();
            loadCarInfo(vin);
            loadLiquids(vin);
          }
        }
      } catch (e) {
        console.error('poll error', e);
      }
    }

    setInterval(poll, 3000);

    // ── CAR INFO — GET /car-info/:vin ─────────────────────────
    async function loadCarInfo(vin) {
      setLoading(carInfo);
      try {
        const res  = await fetch('/car-info/' + vin);
        const data = await res.json();
        renderCar(data);
      } catch (e) {
        console.error('car-info error', e);
        setError(carInfo, 'Нет данных об автомобиле');
      }
    }

    function renderCar(d) {
      const name = [d.brand, d.model].filter(Boolean).join(' ');

      const fields = [
        { k: 'Год',       v: d.year },
        { k: 'Двигатель', v: d.engine ? (d.engine.code + ' (' + d.engine.volume + 'л)') : null },
        { k: 'Тип',       v: d.engine?.type },
        { k: 'Мощность',  v: d.power_hp ? d.power_hp + ' л.с' : null },
        { k: 'КПП',       v: d.transmission },
        { k: 'Привод',    v: d.drive },
      ].filter(f => f.v);

      carInfo.innerHTML =
        (name ? '<div class="car-name">' + name + '</div>' : '') +
        '<div>' +
          fields.map(f =>
            '<div class="car-field">' +
              '<span class="cf-key">' + f.k + ':</span>' +
              '<span class="cf-val">'  + f.v + '</span>' +
            '</div>'
          ).join('') +
          (!fields.length && !name
            ? '<p style="color:var(--soft);font-size:13px">Нет данных</p>'
            : '') +
        '</div>';
    }

    // ── OIL — GET /oil/:vin ───────────────────────────────────
    async function loadLiquids(vin) {
      const localVin = vin;
      setLoading(liquids);

      try {
        const res  = await fetch('/oil/' + vin);
        const data = await res.json();

        if (localVin !== currentVin) return; // VIN сменился — игнорируем

        const oil       = data.oil;
        const sourceUrl = data?.url || null;

        if (!oil) {
          liquids.innerHTML = emptyHtml('🛢️', 'Нет данных по маслу');
          return;
        }

        const volume = oil.volume;
        const best   = oil.oil?.best        || [];
        const alt    = oil.oil?.alternative || [];

        function renderItems(arr) {
          if (!arr.length) return '<p style="color:var(--soft);font-size:13px">—</p>';
          return arr.map(item => {
            const specs     = item.specs     || [];
            const viscosity = item.viscosity || [];
            return (
              '<div class="oil-item">' +
                (specs.length
                  ? '<div class="oil-row"><span class="oil-key">Допуски:</span>' +
                    '<div class="badges">' +
                      specs.map(s => '<span class="badge">' + s + '</span>').join('') +
                    '</div></div>'
                  : '') +
                (viscosity.length
                  ? '<div class="oil-row"><span class="oil-key">Вязкость:</span>' +
                    '<div class="badges">' +
                      viscosity.map(v => '<span class="badge">' + v + '</span>').join('') +
                    '</div></div>'
                  : '') +
              '</div>'
            );
          }).join('');
        }

        liquids.innerHTML =
          '<div class="oil-title">Масло двигателя</div>' +
          (volume
            ? '<div class="oil-volume">Объём: <strong>' + volume + ' л</strong></div>'
            : '') +
          '<div class="oil-section-lbl">Лучший выбор</div>' +
          renderItems(best) +
          '<div class="oil-section-lbl">Альтернатива</div>' +
          renderItems(alt) +
          (sourceUrl
            ? '<div class="source-row">' +
                '<a href="' + sourceUrl + '" target="_blank" rel="noopener noreferrer" class="source-link">' +
                  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                    '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>' +
                    '<polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>' +
                  '</svg>' +
                  'источник' +
                '</a>' +
              '</div>'
            : '');

      } catch (e) {
        if (localVin !== currentVin) return;
        console.error('oil error', e);
        setError(liquids, 'Ошибка загрузки');
      }
    }

    // ── HELPERS ───────────────────────────────────────────────
    function setLoading(el, msg) {
      el.innerHTML =
        '<div class="loading-row">' +
          '<div class="spinner"></div>' +
          (msg || 'Загрузка…') +
        '</div>';
    }

    function setError(el, msg) {
      el.innerHTML = emptyHtml('⚠️', msg);
    }

    function emptyHtml(icon, msg) {
      return (
        '<div class="empty">' +
          '<div class="empty-ico">' + icon + '</div>' +
          '<div class="empty-txt">' + msg  + '</div>' +
        '</div>'
      );
    }
  </script>
</body>
</html>
