<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чат</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #f3f4f6;
      --surface: #ffffff;
      --surface2:#f0f0ee;
      --border:  #e2e0dc;
      --border2: #cecbc5;
      --accent:  #111111;
      --text:    #111111;
      --muted:   #6b7280;
      --soft:    #9ca3af;
      --blue:    #2563eb;
      --radius:  10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px; line-height: 1.5;
      height: 100vh; display: flex; flex-direction: column;
    }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 52px;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07); flex-shrink: 0;
    }
    .brand  { font-size: 16px; font-weight: 700; }
    .sub    { font-size: 13px; color: var(--muted); }
    .hint   { margin-left: auto; font-size: 12px; color: var(--soft); }
    .back-link {
      margin-left: auto; font-size: 12px; color: var(--soft);
      text-decoration: none; display: flex; align-items: center; gap: 4px;
    }
    .back-link:hover { color: var(--accent); }

    .messages {
      flex: 1; overflow-y: auto;
      padding: 16px 20px; display: flex; flex-direction: column; gap: 8px;
    }

    .msg {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      max-width: 680px; word-break: break-word;
      animation: fadeIn .15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .msg-text { font-size: 14px; white-space: pre-wrap; }
    .msg-time { font-size: 11px; color: var(--soft); margin-top: 4px; }

    .empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--soft);
    }
    .empty-ico { font-size: 32px; opacity: .35; }
    .empty-hint { font-size: 12px; }

    .input-bar {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 12px 20px; display: flex; gap: 8px; flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; border: 1px solid var(--border2); border-radius: var(--radius);
      display: flex; overflow: hidden;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    #msgInput {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: 'Inter', sans-serif; font-size: 14px;
      padding: 10px 14px;
    }
    .btn-send {
      border: none; background: var(--accent); color: #fff;
      padding: 0 18px; font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-send:hover { opacity: .8; }

    .cmd-hint {
      font-size: 11px; color: var(--soft); padding: 4px 0 0;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">💬 Чат</div>
  <div class="sub">Обмен текстом</div>
  <a class="back-link" href="/xfer">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Файлы
  </a>
</header>

<div class="messages" id="messages">
  <div class="empty-chat" id="emptyState">
    <div class="empty-ico">💬</div>
    <div>Нет сообщений</div>
    <div class="empty-hint">Напишите что-нибудь ниже</div>
  </div>
</div>

<div class="input-bar">
  <div style="flex:1;display:flex;flex-direction:column;gap:4px">
    <div class="input-wrap">
      <input id="msgInput" type="text" placeholder="Сообщение…" autocomplete="off" />
      <button class="btn-send" id="btnSend">Отправить</button>
    </div>
    <div class="cmd-hint">Введите <b>/clear</b> чтобы очистить чат</div>
  </div>
</div>

<script>
  let lastTs = 0;
  let polling = null;

  function fmt(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, "0");
    return pad(d.getDate()) + "." + pad(d.getMonth()+1) + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
  }

  function esc(s) {
    return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderMessages(msgs) {
    const el = document.getElementById("messages");
    const empty = document.getElementById("emptyState");
    if (!msgs.length) {
      el.innerHTML = "";
      el.appendChild(empty);
      empty.style.display = "flex";
      lastTs = 0;
      return;
    }
    empty.style.display = "none";

    // Добавляем только новые
    const newMsgs = msgs.filter(m => m.ts > lastTs);
    if (!newMsgs.length) return;

    newMsgs.forEach(m => {
      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = '<div class="msg-text">' + esc(m.text) + '</div>' +
                      '<div class="msg-time">' + fmt(m.ts) + '</div>';
      el.appendChild(div);
    });
    lastTs = msgs[msgs.length - 1].ts;
    el.scrollTop = el.scrollHeight;
  }

  async function poll() {
    try {
      const res = await fetch("/chat/messages");
      const msgs = await res.json();
      renderMessages(msgs);
    } catch (_) {}
  }

  async function send() {
    const input = document.getElementById("msgInput");
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    try {
      const res = await fetch("/chat/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      if (data.cleared) {
        lastTs = 0;
      }
      await poll();
    } catch (_) {}
  }

  document.getElementById("btnSend").addEventListener("click", send);
  document.getElementById("msgInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  poll();
  polling = setInterval(poll, 3000);
</script>
</body>
</html>
